name = "limitless-mcp"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "limitless-db"
database_id = "YOUR_D1_DATABASE_ID"

[[vectorize]]
binding = "VECTORIZE"
index_name = "limitless-index"

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "OAUTH_KV"
id = "YOUR_KV_NAMESPACE_ID"

[durable_objects]
bindings = [
  { name = "MCP_OBJECT", class_name = "LimitlessMCP" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["LimitlessMCP"]
